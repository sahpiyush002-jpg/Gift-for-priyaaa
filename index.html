<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A Gift For PRIYA 💝</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,700&display=swap" rel="stylesheet">
<style>
:root { --bg: #c0392b; }
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:#fff;overflow:hidden;height:100vh;width:100vw;position:relative;}

.page{display:none;width:100vw;height:100vh;flex-direction:column;align-items:center;justify-content:center;position:fixed;top:0;left:0;padding:15px;z-index:10;}
.page.active{display:flex;animation:fadeIn 0.6s ease;}
@keyframes fadeIn{from{opacity:0;transform:scale(0.95);}to{opacity:1;transform:scale(1);}}

.polaroid{background:#fff;padding:10px;box-shadow:0 15px 35px rgba(0,0,0,0.5);transform:rotate(var(--r,-3deg));max-width:85%;max-height:55vh;border-radius:6px;overflow:hidden;}
.polaroid img{width:100%;height:auto;max-height:52vh;object-fit:contain;display:block;}

.btn-main{background:#fff;color:var(--bg);border:none;padding:14px 34px;border-radius:50px;font-size:1.1rem;font-weight:600;cursor:pointer;margin-top:20px;box-shadow:0 5px 20px rgba(0,0,0,0.3);}

.dot{width:16px;height:16px;border:2px solid #fff;border-radius:50%;margin:0 6px;}
.dot.filled{background:#fff;box-shadow:0 0 12px #fff;}

#petals{position:fixed;inset:0;pointer-events:none;z-index:1;}
.petal{position:absolute;font-size:2rem;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh);}}
</style>
</head>
<body>

<div id="petals"></div>

<!-- Lock Screen -->
<div class="page active" id="p-lock">
    <div class="polaroid" style="--r:-4deg;margin-bottom:30px"><img src="photo1.png"><span>For PRIYA 💕</span></div>
    <div style="display:flex;margin:20px 0"><div class="dot" id="d0"></div><div class="dot" id="d1"></div><div class="dot" id="d2"></div><div class="dot" id="d3"></div></div>
    
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
        <button class="kkey" onclick="tap(1)">1</button><button class="kkey" onclick="tap(2)">2</button><button class="kkey" onclick="tap(3)">3</button>
        <button class="kkey" onclick="tap(4)">4</button><button class="kkey" onclick="tap(5)">5</button><button class="kkey" onclick="tap(6)">6</button>
        <button class="kkey" onclick="tap(7)">7</button><button class="kkey" onclick="tap(8)">8</button><button class="kkey" onclick="tap(9)">9</button>
        <div></div><button class="kkey" onclick="tap(0)">0</button><button class="kkey" onclick="del()">⌫</button>
    </div>
</div>

<script>
let input = "";
function go(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
function tap(n) {
    if(input.length < 4){
        input += n;
        updateDots();
        if(input === "2208") setTimeout(() => go('p-cam'), 300);
        else if(input.length === 4){ alert("Wrong Passcode!"); input = ""; updateDots(); }
    }
}
function del(){ input = input.slice(0,-1); updateDots(); }
function updateDots(){
    for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled', i < input.length);
}

// Petals Animation
setInterval(() => {
    let p = document.createElement('div');
    p.className = 'petal';
    p.textContent = ['❤️','🌸','💕','✨'][Math.floor(Math.random()*4)];
    p.style.left = Math.random()*100 + 'vw';
    p.style.animationDuration = (Math.random()*8 + 7) + 's';
    document.getElementById('petals').appendChild(p);
    setTimeout(() => p.remove(), 15000);
}, 400);
</script>
</body>
</html>
